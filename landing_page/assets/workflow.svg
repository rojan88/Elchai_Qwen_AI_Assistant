<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg"
     width="1000"
     height="220"
     viewBox="0 0 1000 220">

    <rect width="1000" height="220" fill="#f5f7fa"/>

    <!-- Upload -->
    <rect x="20" y="70"
          width="150"
          height="70"
          rx="10"
          fill="#ffffff"
          stroke="#0b63ce"
          stroke-width="2"/>

    <text x="95"
          y="112"
          text-anchor="middle"
          font-size="18"
          font-family="Arial"
          fill="#333">
        Upload Document
    </text>

    <!-- Arrow -->
    <line x1="170" y1="105"
          x2="250" y2="105"
          stroke="#0b63ce"
          stroke-width="3"/>

    <polygon points="250,105 238,98 238,112"
             fill="#0b63ce"/>

    <!-- AI -->
    <rect x="250" y="70"
          width="180"
          height="70"
          rx="10"
          fill="#ffffff"
          stroke="#0b63ce"
          stroke-width="2"/>

    <text x="340"
          y="112"
          text-anchor="middle"
          font-size="18"
          font-family="Arial"
          fill="#333">
        Qwen AI Analysis
    </text>

    <!-- Arrow -->
    <line x1="430" y1="105"
          x2="510" y2="105"
          stroke="#0b63ce"
          stroke-width="3"/>

    <polygon points="510,105 498,98 498,112"
             fill="#0b63ce"/>

    <!-- Summary -->
    <rect x="510" y="70"
          width="180"
          height="70"
          rx="10"
          fill="#ffffff"
          stroke="#0b63ce"
          stroke-width="2"/>

    <text x="600"
          y="112"
          text-anchor="middle"
          font-size="18"
          font-family="Arial"
          fill="#333">
        Generate Summary
    </text>

    <!-- Arrow -->
    <line x1="690" y1="105"
          x2="770" y2="105"
          stroke="#0b63ce"
          stroke-width="3"/>

    <polygon points="770,105 758,98 758,112"
             fill="#0b63ce"/>

    <!-- Review -->
    <rect x="770" y="70"
          width="210"
          height="70"
          rx="10"
          fill="#ffffff"
          stroke="#0b63ce"
          stroke-width="2"/>

    <text x="875"
          y="112"
          text-anchor="middle"
          font-size="18"
          font-family="Arial"
          fill="#333">
        Human Review
    </text>

</svg>